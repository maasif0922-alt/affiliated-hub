<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliExpress Finds | AffiliateHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .page-header {
            background: #fef2f2; /* AliExpress light red */
            padding: 4rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .page-header h1 {
            font-size: 2.5rem;
            color: #1e293b;
        }
        .ali-tag {
            color: #dc2626;
            font-weight: 700;
        }
        .card-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
        }
        /* Filter Styles */
        .filter-section {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .filter-group label {
            font-weight: 700;
            font-size: 0.875rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        .filter-select {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: #f8fafc;
            color: #1e293b;
            font-size: 0.9375rem;
            outline: none;
            cursor: pointer;
            min-width: 180px;
            transition: all 0.2s;
        }
        .filter-select:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>

    <header class="page-header">
        <div class="container animate-fade-in">
            <div class="back-btn-container">
                <a href="index.html" class="back-btn">
                    <i data-lucide="arrow-left"></i> Back to Home
                </a>
            </div>
            <h1>Trending <span class="ali-tag">AliExpress</span> Products</h1>
            <p>Discover high-quality gadgets and unique finds at unbeatable prices from AliExpress.</p>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="filter-section animate-fade-in" style="margin-top: -2rem; position: relative; z-index: 10;">
                <div class="filter-group">
                    <label><i data-lucide="globe" style="width: 16px; vertical-align: middle;"></i> Country</label>
                    <select id="country-filter" class="filter-select" onchange="applyAliFilters()">
                        <option value="all">Check All Countries</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i data-lucide="tag" style="width: 16px; vertical-align: middle;"></i> Category</label>
                    <select id="category-filter" class="filter-select" onchange="applyAliFilters()">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div id="filter-results-count" style="margin-left: auto; color: var(--text-muted); font-size: 0.875rem; font-weight: 600;">
                    Showing all products
                </div>
            </div>

            <div class="product-grid" id="aliexpress-products">
                <!-- Products will be injected here -->
            </div>
        </div>
    </section>

    <footer></footer>

    <script src="js/main.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAliFilters();
        });

        function initAliFilters() {
            // Populate filter selects from Platform Filters
            const allFilters = getPlatformFilters();
            const platformData = allFilters.aliexpress || { categories: [], countries: {} };
            
            // Countries
            const countrySelect = document.getElementById('country-filter');
            Object.entries(platformData.countries || {}).forEach(([code, name]) => {
                const opt = document.createElement('option');
                opt.value = code;
                opt.innerText = name;
                countrySelect.appendChild(opt);
            });

            // Categories
            const categorySelect = document.getElementById('category-filter');
            (platformData.categories || []).forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                categorySelect.appendChild(opt);
            });

            // Initial render
            applyAliFilters();
        }

        function applyAliFilters() {
            const country = document.getElementById('country-filter').value;
            const category = document.getElementById('category-filter').value;
            
            renderPlatformProducts('aliexpress', 'aliexpress-products', null, { country, category });
            
            // Update count
            setTimeout(() => {
                const count = document.querySelectorAll('#aliexpress-products .card').length;
                const countEl = document.getElementById('filter-results-count');
                if (countEl) countEl.innerText = `Found ${count} products`;
            }, 100);
        }
    </script>
</body>
</html>
