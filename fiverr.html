<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiverr Services | AffiliateHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            background: #f0fdf4; /* Fiverr light green */
            padding: 4rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .page-header h1 {
            font-size: 2.5rem;
            color: #1e293b;
        }
        .fiverr-tag {
            color: #16a34a;
            font-weight: 700;
        }
        .card-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>

    <header class="page-header">
        <div class="container animate-fade-in">
            <h1>Premium <span class="fiverr-tag">Fiverr</span> Services</h1>
            <p>Hire top-rated freelancers for logo design, SEO, video editing, and more.</p>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="product-grid" id="fiverr-services">
                <!-- Services will be injected here -->
            </div>
        </div>
    </section>

    <footer></footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderPlatformProducts('fiverr', 'fiverr-services');
        });

        function renderPlatformProducts(platform, gridId) {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const grid = document.getElementById(gridId);
            
            products.filter(p => p.platform === platform).forEach(p => {
                grid.appendChild(createProductCard(p));
            });
            
            if (window.lucide) lucide.createIcons();
        }

        function createProductCard(product) {
            const div = document.createElement('div');
            div.className = 'card animate-fade-in';
            div.innerHTML = `
                <div class="card-image">
                    <img src="${product.image}" alt="${product.title}">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${product.title}</h3>
                    <div class="rating">
                        ${renderStars(product.rating)}
                    </div>
                    <div class="card-footer">
                        <span class="price">${product.price}</span>
                        <a href="${product.link}" class="btn btn-primary" onclick="trackClick('${product.id}', '${product.link}')" target="_blank">
                            Hire on Fiverr
                        </a>
                    </div>
                </div>
            `;
            return div;
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < Math.floor(rating)) {
                    stars += '<i data-lucide="star" style="width: 14px; fill: #f59e0b; color: #f59e0b"></i>';
                } else {
                    stars += '<i data-lucide="star" style="width: 14px; color: #cbd5e1"></i>';
                }
            }
            return stars;
        }
    </script>
</body>
</html>
