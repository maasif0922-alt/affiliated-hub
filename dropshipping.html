<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Store | AffiliateHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .store-header {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 5rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        .store-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary-color), #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            padding: 4rem 0;
        }
        .direct-card {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .direct-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-xl);
        }
        .direct-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .direct-card-content {
            padding: 1.5rem;
        }
        .direct-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            font-family: 'Outfit', sans-serif;
        }
        .add-cart-btn {
            width: 100%;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>

    <header class="store-header">
        <div class="container animate-fade-in">
            <span style="text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; color: var(--primary-color); font-size: 0.8rem;">Exclusive Direct Collection</span>
            <h1>Our Premium Store</h1>
            <p style="max-width: 600px; margin: 0 auto; color: var(--text-muted);">
                Shop directly from our curated collections. Fast shipping, secure payments, and premium quality guaranteed on every order.
            </p>
        </div>
    </header>

    <main class="container">
        <div id="dropshipping-grid" class="store-grid">
            <!-- Products will be injected here -->
        </div>
    </main>

    <footer></footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderPlatformProducts('direct', 'dropshipping-grid');
        });
    </script>
</body>
</html>
