<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Deals | AffiliateHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            background: #fff7ed; /* Amazon-ish light orange */
            padding: 4rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .page-header h1 {
            font-size: 2.5rem;
            color: #1e293b;
        }
        .amazon-tag {
            color: #ea580c;
            font-weight: 700;
        }
        /* Fix for lint warnings */
        .card-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2; /* Standard property */
            overflow: hidden;
        }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>

    <header class="page-header">
        <div class="container animate-fade-in">
            <div class="back-btn-container">
                <a href="index.html" class="back-btn">
                    <i data-lucide="arrow-left"></i> Back to Home
                </a>
            </div>
            <h1>Top <span class="amazon-tag">Amazon</span> Products</h1>
            <p>Hand-picked premium products from the world's largest marketplace. Quality guaranteed.</p>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="product-grid" id="amazon-products">
                <!-- Amazon products will be injected here -->
            </div>
        </div>
    </section>

    <footer></footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderPlatformProducts('amazon', 'amazon-products');
        });
    </script>
</body>
</html>
