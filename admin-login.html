<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AffiliateHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 450px;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 1rem;
            font-family: 'Outfit', sans-serif;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #94a3b8;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: #6366f1;
            color: white;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div style="background: rgba(99, 102, 241, 0.1); width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid rgba(99, 102, 241, 0.2);">
                <i data-lucide="shield-lock" style="color: #818cf8; width: 32px; height: 32px;"></i>
            </div>
            <h1 style="margin-top:0;">Admin Console</h1>
            <p style="color: #94a3b8; font-size: 0.95rem;">Please enter your credentials to continue</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <div style="position: relative;">
                    <i data-lucide="user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 18px; color: #64748b;"></i>
                    <input type="text" id="username" placeholder="admin" required style="padding-left: 3rem;">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <i data-lucide="key-round" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 18px; color: #64748b;"></i>
                    <input type="password" id="password" placeholder="••••••••" required style="padding-left: 3rem;">
                </div>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Sign In</span>
                <i data-lucide="arrow-right" style="width: 18px;"></i>
            </button>
            <div id="error-msg" class="error-msg">Incorrect username or password.</div>
        </form>
    </div>

    <script src="js/config.js?v=1.1.1"></script>
    <script src="js/main.js?v=4"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // Simple demo auth
            if (u === 'admin' && p === 'admin123') {
                sessionStorage.setItem('admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
