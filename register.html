<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AffiliateHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Shared auth styles from login.html */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--hero-mesh);
            background-color: var(--bg-dark);
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 550px;
            padding: 3rem;
            border-radius: var(--radius-xl);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: var(--shadow-xl);
        }
        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-header h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group.full { grid-column: span 2; }
        .label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #94a3b8; }
        .input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: white;
            transition: all 0.3s ease;
        }
        .input:focus { border-color: var(--primary-color); outline: none; }
        .btn-auth { width: 100%; padding: 1rem; margin-top: 1rem; }
        .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.9rem; color: #94a3b8; }
        .auth-footer a { color: var(--primary-color); font-weight: 700; }
    </style>
</head>
<body class="auth-page">
    <div style="position: fixed; top: 2rem; left: 2rem; z-index: 100;">
        <a href="index.html" class="back-btn" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;">
            <i data-lucide="arrow-left"></i> Home
        </a>
    </div>
    <div class="auth-card animate-fade-in">
        <div class="auth-header">
            <h1>Join AffiliateHub</h1>
            <p>Create an account to start shopping and tracking your orders</p>
        </div>

        <form id="register-form">
            <div class="form-grid">
                <div class="form-group">
                    <label class="label">Full Name</label>
                    <input type="text" id="name" class="input" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="label">WhatsApp Number</label>
                    <input type="tel" id="whatsapp" class="input" required placeholder="+92 300 1234567">
                </div>
                <div class="form-group full">
                    <label class="label">Email Address</label>
                    <input type="email" id="email" class="input" required placeholder="name@example.com">
                </div>
                <div class="form-group full">
                    <label class="label">Delivery Address</label>
                    <input type="text" id="address" class="input" required placeholder="Street, City, Country">
                </div>
                <div class="form-group">
                    <label class="label">Password</label>
                    <input type="password" id="password" class="input" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label class="label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="input" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Create My Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="js/main.js?v=2"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            
            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            const userData = {
                name: document.getElementById('name').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                password: password
            };

            const result = registerUser(userData);
            if (result.success) {
                alert('Account created successfully! Please login.');
                location.href = 'login.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
